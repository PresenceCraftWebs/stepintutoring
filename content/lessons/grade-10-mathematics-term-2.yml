lessons:
  - id: g10-math-t2-01
    title: "Functions: the straight line"
    topic: Functions
    order: 1
    hostProvider: r2
    r2VideoKey: https://test-videos.co.uk/vids/bigbuckbunny/mp4/h264/360/Big_Buck_Bunny_360_10s_2MB.mp4
    r2FileSizeBytes: 2070701
    durationMinutes: 15
    tags: []
    notes: |
      ## What you will learn
      Sketching $y = mx + c$, finding gradient and intercepts, and reading
      information off a straight-line graph.

      ## Key points
      - $m$ is the gradient: $\frac{\text{change in } y}{\text{change in } x}$.
      - $c$ is the $y$-intercept.
      - For the $x$-intercept, set $y = 0$.
  - id: g10-math-t2-02
    title: "Functions: the parabola"
    topic: Functions
    order: 2
    hostProvider: r2
    r2VideoKey: https://test-videos.co.uk/vids/sintel/mp4/h264/360/Sintel_360_10s_5MB.mp4
    r2FileSizeBytes: 5241895
    durationMinutes: 17
    tags: [exam-prep]
    notes: |
      ## What you will learn
      Sketching $y = ax^2 + q$, the effect of $a$ and $q$, and finding the
      turning point, axis of symmetry and intercepts.

      ## Key points
      - $a > 0$: "smile" shape; $a < 0$: "frown" shape.
      - $q$ shifts the whole graph up or down.
      - The axis of symmetry of $y = ax^2 + q$ is the $y$-axis.
  - id: g10-math-t2-03
    title: Trigonometric ratios in right-angled triangles
    topic: Trigonometry
    order: 3
    hostProvider: r2
    r2VideoKey: https://test-videos.co.uk/vids/bigbuckbunny/mp4/h264/360/Big_Buck_Bunny_360_10s_5MB.mp4
    r2FileSizeBytes: 5229245
    durationMinutes: 20
    tags: [exam-prep]
    worksheet: /worksheets/g10-math-t2-03.pdf
    notes: |
      ## What you will learn
      Defining $\sin$, $\cos$ and $\tan$ in a right-angled triangle and using
      them to find unknown sides and angles.

      ## Key points
      - SOH-CAH-TOA: sin = opposite/hypotenuse, cos = adjacent/hypotenuse,
        tan = opposite/adjacent.
      - Label the triangle *from the angle you are working with*.
      - Make sure your calculator is in **degree** mode.
