# Grade 10 Physical Sciences — Term 1 (CAPS)
# SEED DATA — see grade-10-mathematics-term-1.yml header for how seeds work.
lessons:
  - id: g10-phys-t1-01
    title: Classification of matter
    topic: Matter and Classification
    order: 1
    hostProvider: r2
    r2VideoKey: https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4
    r2FileSizeBytes: 1128375
    durationMinutes: 13
    tags: []
    notes: |
      ## What you will learn
      Classifying materials as elements, compounds and mixtures, and as
      metals, metalloids and non-metals.

      ## Key points
      - A *pure substance* is an element or a compound.
      - Mixtures can be separated by physical means; compounds cannot.
      - Know the difference between homogeneous and heterogeneous mixtures.
  - id: g10-phys-t1-02
    title: States of matter and the kinetic molecular theory
    topic: States of Matter
    order: 2
    hostProvider: r2
    r2VideoKey: https://test-videos.co.uk/vids/jellyfish/mp4/h264/360/Jellyfish_360_10s_5MB.mp4
    r2FileSizeBytes: 5242707
    durationMinutes: 15
    tags: [revision]
    notes: |
      ## What you will learn
      How the kinetic molecular theory explains solids, liquids and gases,
      and what happens to particles during changes of state.

      ## Key points
      - Particles are always moving; temperature measures their average
        kinetic energy.
      - Melting, evaporation and sublimation absorb energy; the reverse
        changes release energy.
      - Temperature stays constant *during* a change of state.
  - id: g10-phys-t1-03
    title: Atomic structure and models of the atom
    topic: The Atom
    order: 3
    hostProvider: r2
    r2VideoKey: https://test-videos.co.uk/vids/bigbuckbunny/mp4/h264/360/Big_Buck_Bunny_360_10s_1MB.mp4
    r2FileSizeBytes: 991017
    durationMinutes: 19
    tags: [exam-prep]
    notes: |
      ## What you will learn
      Protons, neutrons and electrons; atomic number and mass number; and how
      the model of the atom developed over time.

      ## Key points
      - Atomic number = number of protons; it defines the element.
      - Mass number = protons + neutrons.
      - Isotopes: same protons, different neutrons.
