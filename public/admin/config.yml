# Sveltia CMS configuration — the content editor at /admin.
#
# WIRING (2 values):
#   backend.repo      your GitHub repo, e.g. step-in-tutoring/app
#   backend.base_url  your deployed sveltia-cms-auth Worker URL
#                     (https://github.com/sveltia/sveltia-cms-auth — one-click
#                      deploy; steps in WIRING.md)

backend:
  name: github
  repo: PresenceCraftWebs/stepintutoring
  branch: main
  base_url: https://sveltia-cms-auth.nduvho-ramashia.workers.dev

media_folder: public/worksheets
public_folder: /worksheets

editor:
  preview: false

collections:
  # ------------------------------------------------------------- lessons
  # One file per (grade, subject, term). Lessons inside a file are a
  # drag-and-drop list — drag to reorder, then update the "order" numbers to
  # match (the app sorts by "order").
  - name: lessons
    label: Lessons (per grade · subject · term)
    folder: content/lessons
    extension: yml
    format: yaml
    create: true
    slug: 'grade-{{fields.grade}}-{{fields.subject}}-term-{{fields.term}}'
    identifier_field: grade
    summary: '{{filename}}'
    fields:
      - name: grade
        label: Grade (must match the file name)
        widget: select
        options: ['10', '11', '12']
        hint: Only used when creating a new file — pick once, don't change.
      - name: subject
        label: Subject id (must match subjects)
        widget: select
        options:
          - mathematics
          - mathematical-literacy
          - physical-sciences
          - life-sciences
          - accounting
          - business-studies
          - economics
          - geography
          - history
      - name: term
        label: Term
        widget: select
        options: ['1', '2', '3', '4']
      - name: lessons
        label: Lessons (drag to reorder)
        label_singular: lesson
        widget: list
        collapsed: true
        summary: '{{fields.order}} — {{fields.title}}'
        fields:
          - name: id
            label: Lesson id (unique, never reuse)
            widget: string
            pattern:
              - '^[a-z0-9-]+$'
              - lowercase letters, numbers and dashes only
            hint: 'e.g. g10-math-t1-05. Changing an id resets students'' progress for the lesson.'
          - name: title
            label: Title
            widget: string
          - name: topic
            label: Topic
            widget: string
            hint: Lessons with the same topic are grouped on the subject page.
          - name: order
            label: Order within this term
            widget: number
            value_type: int
          - name: hostProvider
            label: Video host
            widget: select
            options:
              - label: Downloadable (default)
                value: r2
              - label: YouTube (stream only)
                value: youtube
          - name: r2VideoKey
            label: Video file reference (downloadable lessons only)
            widget: string
            required: false
            hint: 'Set automatically when a video is uploaded, e.g. videos/g10-….mp4. Leave empty for YouTube lessons.'
          - name: r2FileSizeBytes
            label: Video file size in bytes (downloadable lessons only)
            widget: number
            value_type: int
            required: false
            hint: Also set automatically. Shown to students before they download.
          - name: youtubeId
            label: YouTube video id (youtube only)
            widget: string
            required: false
            pattern:
              - '^[A-Za-z0-9_-]{11}$|^$'
              - the 11-character id from the video URL (after watch?v=)
          - name: attribution
            label: Attribution (public YouTube videos only)
            widget: string
            required: false
            hint: 'Credit the channel, e.g. "Mindset Learn". Leave empty for our own videos.'
          - name: durationMinutes
            label: Length (minutes)
            widget: number
            value_type: int
          - name: notes
            label: Study notes (Markdown)
            widget: markdown
            required: false
          - name: worksheet
            label: Worksheet PDF
            widget: file
            required: false
          - name: tags
            label: Tags
            widget: select
            multiple: true
            required: false
            options:
              - label: Exam prep
                value: exam-prep
              - label: Past paper
                value: past-paper
              - label: Revision
                value: revision
          - name: videoRemoved
            label: 'Video removed (needs attention)'
            widget: boolean
            required: false
            hint: Set automatically when a video is deleted. Untick after re-uploading the video or adding a YouTube link.

  # ------------------------------------------------------------ subjects
  - name: settings
    label: Subjects & storage
    files:
      - name: subjects
        label: Subjects
        file: content/subjects.json
        fields:
          - name: subjects
            label: Subjects
            label_singular: subject
            widget: list
            root: true # the JSON file is the array itself
            summary: '{{fields.name}}'
            fields:
              - name: id
                label: Id (used in file names — don't change later)
                widget: string
                pattern:
                  - '^[a-z0-9-]+$'
                  - lowercase letters, numbers and dashes only
              - name: name
                label: Name
                widget: string
              - name: icon
                label: Icon
                widget: select
                options:
                  [
                    sigma,
                    calculator,
                    atom,
                    leaf,
                    book,
                    ledger,
                    briefcase,
                    trend,
                    globe,
                    scroll,
                  ]
              - name: color
                label: Accent colour
                widget: color
      - name: storage
        label: Storage manifest (updated automatically)
        file: content/storage-manifest.json
        fields:
          - name: totalBytesUsed
            label: Total bytes used (updated automatically — only edit to fix a mismatch)
            widget: number
            value_type: int
          - name: softCapBytes
            label: Storage limit in bytes (9000000000 = 9 GB of the 10 GB available)
            widget: number
            value_type: int
          - name: lastUpdated
            label: Last updated
            widget: string

  # ------------------------------------------------------------- careers
  - name: careers
    label: Career Corner articles
    folder: content/careers
    extension: md
    format: frontmatter
    create: true
    slug: '{{slug}}'
    summary: '{{title}}'
    fields:
      - name: title
        label: Title
        widget: string
      - name: summary
        label: One-line summary (shown in the list)
        widget: string
      - name: order
        label: Order
        widget: number
        value_type: int
      - name: body
        label: Article (Markdown)
        widget: markdown
